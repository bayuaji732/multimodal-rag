services:
  # ── Qdrant vector store ──────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.11.3
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334

  # ── Redis (Celery broker + backend) ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # ── FastAPI app ───────────────────────────────────────────────────────────────
  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      QDRANT_HOST: qdrant
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER: redis://redis:6379/0
      CELERY_BACKEND: redis://redis:6379/1
    env_file:
      - .env
    depends_on:
      - qdrant
      - redis

  # ── Celery worker ─────────────────────────────────────────────────────────────
  worker:
    build: .
    command: celery -A ingestion.pipeline.celery_app worker -Q ingestion -c 2 --loglevel=info
    volumes:
      - .:/app
    environment:
      QDRANT_HOST: qdrant
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER: redis://redis:6379/0
      CELERY_BACKEND: redis://redis:6379/1
    env_file:
      - .env
    depends_on:
      - qdrant
      - redis

  # ── Flower (Celery monitor) ───────────────────────────────────────────────────
  flower:
    build: .
    command: celery -A ingestion.pipeline.celery_app flower --port=5555
    ports:
      - "5555:5555"
    env_file:
      - .env
    environment:
      CELERY_BROKER: redis://redis:6379/0
    depends_on:
      - redis

volumes:
  qdrant_data:
